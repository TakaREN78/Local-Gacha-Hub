<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            900: '#121212',
                            800: '#1e1e1e',
                            750: '#2a2a2a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar to make the calendar ribbon look sleek */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-300 p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-6 border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Gacha Operations</h1>
                <p class="text-sm text-gray-400 mt-1">Real Time: <span id="local-clock"
                        class="text-white font-mono">--:--:--</span></p>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <p class="text-xs text-teal-500 uppercase tracking-widest font-bold mb-1" id="view-mode-badge">PRESENT
                    MODE</p>
                <a href="settings.html"
                    class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded border border-gray-600 transition flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    Control Room
                </a>
            </div>
        </div>

        <div id="calendar-ribbon" class="flex gap-3 overflow-x-auto pb-4 mb-6 custom-scrollbar scroll-smooth">
        </div>

        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500 italic col-span-full">Initializing telemetry arrays...</p>
        </div>
    </div>

    <div class="fixed bottom-8 right-8 flex gap-4 z-50">
        <button onclick="resetAllTasks()"
            class="bg-gray-800 hover:bg-red-900/80 text-gray-400 hover:text-red-200 px-6 py-3 rounded-full shadow-lg font-bold tracking-widest uppercase border border-gray-700 hover:border-red-500 transition transform hover:scale-105 flex items-center gap-2">
            Reset Logs
        </button>
        <button onclick="syncTasks()"
            class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-3 rounded-full shadow-lg font-bold tracking-widest uppercase border border-teal-400 transition transform hover:scale-105 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                </path>
            </svg>
            Sync Telemetry
        </button>
    </div>

    <script src="js/engine.js?v=time_machine"></script>
</body>

</html>
